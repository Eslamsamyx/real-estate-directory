<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Particle Storm · PlayCanvas</title>
    <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #04060a;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", system-ui, sans-serif;
            -webkit-font-smoothing: antialiased; color: #e8eaf2;
            user-select: none; -webkit-user-select: none; cursor: grab;
        }
        body.dragging { cursor: grabbing; }
        #app { display: block; width: 100vw; height: 100vh; touch-action: none; }

        .hud { position: fixed; pointer-events: none; z-index: 10; }
        .hud--tl { top: 28px; left: 32px; }
        .hud--bl { bottom: 24px; left: 32px; }
        .hud--br { bottom: 24px; right: 32px; }

        .title { font-size: 11px; font-weight: 600; letter-spacing: 0.45em; color: rgba(255,255,255,0.42); text-transform: uppercase; margin: 0 0 8px; }
        .heading { font-size: 30px; font-weight: 200; letter-spacing: 0.18em; margin: 0; line-height: 1; color: rgba(255,255,255,0.95); text-shadow: 0 0 24px rgba(180,220,255,0.18); }
        .heading b { font-weight: 400; color: rgba(180,220,255,1); }

        .legend { display: flex; gap: 18px; font-size: 10.5px; letter-spacing: 0.32em; color: rgba(255,255,255,0.45); text-transform: uppercase; }
        .legend span::before { content: ''; display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: rgba(180,220,255,0.85); margin-right: 9px; vertical-align: middle; box-shadow: 0 0 8px rgba(180,220,255,0.7); }

        .stat { font-size: 10.5px; letter-spacing: 0.32em; color: rgba(255,255,255,0.42); text-transform: uppercase; font-variant-numeric: tabular-nums; text-align: right; }
        .stat span { color: rgba(180,220,255,1); }

        .splash { position: fixed; inset: 0; background: #04060a; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; z-index: 100; transition: opacity 600ms ease 200ms, visibility 0s linear 800ms; }
        .splash.hidden { opacity: 0; visibility: hidden; }
        .spinner { width: 30px; height: 30px; border: 1px solid rgba(255,255,255,0.1); border-top-color: rgba(180,220,255,0.9); border-radius: 50%; animation: spin 0.9s linear infinite; }
        .splash-label { font-size: 10.5px; letter-spacing: 0.45em; color: rgba(255,255,255,0.4); text-transform: uppercase; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .vignette { position: fixed; inset: 0; pointer-events: none; z-index: 5; background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%); }

        .back-link {
            position: fixed; top: 28px; right: 32px; z-index: 11;
            font-size: 10.5px; letter-spacing: 0.32em; color: rgba(255,255,255,0.55); text-transform: uppercase;
            text-decoration: none; padding: 8px 14px;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 999px;
            background: rgba(15,17,25,0.4);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .back-link:hover { color: #fff; border-color: rgba(255,255,255,0.25); }

        @media (max-width: 640px) {
            .heading { font-size: 22px; }
            .hud--tl, .hud--bl, .hud--br { left: 18px; right: 18px; top: 18px; bottom: 18px; }
            .hud--br { left: auto; }
            .hud--tl, .hud--bl { right: auto; }
            .legend { gap: 12px; flex-wrap: wrap; }
        }
    </style>
    <script type="importmap">
    {
        "imports": { "playcanvas": "./vendor/playcanvas.mjs" }
    }
    </script>
</head>
<body>
    <canvas id="app"></canvas>

    <div class="splash" id="splash">
        <div class="spinner"></div>
        <div class="splash-label">Spawning storm</div>
    </div>

    <div class="vignette"></div>
    <a class="back-link" href="./index.html">← GALLERY</a>

    <div class="hud hud--tl">
        <div class="title">PlayCanvas · GPU Particle System</div>
        <h1 class="heading">PARTICLE <b>STORM</b></h1>
    </div>

    <div class="hud hud--bl">
        <div class="legend">
            <span>DRAG · ORBIT</span>
            <span>SCROLL · ZOOM</span>
        </div>
    </div>

    <div class="hud hud--br">
        <div class="stat"><span id="count">--</span> PARTICLES · <span id="fps">--</span> FPS</div>
    </div>

    <script type="module">
        import * as pc from 'playcanvas';

        const canvas = document.getElementById('app');
        const splash = document.getElementById('splash');
        const fpsEl = document.getElementById('fps');
        const countEl = document.getElementById('count');

        const app = new pc.Application(canvas, {
            mouse: new pc.Mouse(canvas),
            touch: new pc.TouchDevice(canvas),
            keyboard: new pc.Keyboard(window),
            graphicsDeviceOptions: { antialias: true, powerPreference: 'high-performance' }
        });
        app.setCanvasFillMode(pc.FILLMODE_FILL_WINDOW);
        app.setCanvasResolution(pc.RESOLUTION_AUTO);
        window.addEventListener('resize', () => app.resizeCanvas());

        app.scene.ambientLight = new pc.Color(0.04, 0.05, 0.08);

        // Camera
        const camera = new pc.Entity('camera');
        camera.addComponent('camera', {
            clearColor: new pc.Color(0.015, 0.02, 0.035),
            fov: 50,
            nearClip: 0.1,
            farClip: 200,
            toneMapping: (typeof pc.TONEMAP_ACES !== 'undefined') ? pc.TONEMAP_ACES : undefined
        });
        app.root.addChild(camera);

        // Light
        const sun = new pc.Entity('sun');
        sun.addComponent('light', {
            type: 'directional',
            color: new pc.Color(0.85, 0.92, 1.0),
            intensity: 0.7,
            castShadows: true,
            shadowResolution: 1024
        });
        sun.setEulerAngles(60, -30, 0);
        app.root.addChild(sun);

        const moon = new pc.Entity('moon');
        moon.addComponent('light', {
            type: 'directional',
            color: new pc.Color(0.4, 0.55, 1.0),
            intensity: 0.3
        });
        moon.setEulerAngles(-20, 165, 0);
        app.root.addChild(moon);

        // Ground (snowy)
        const groundMat = new pc.StandardMaterial();
        groundMat.diffuse = new pc.Color(0.30, 0.34, 0.42);
        groundMat.metalness = 0.1;
        groundMat.useMetalness = true;
        groundMat.gloss = 0.35;
        groundMat.update();
        const ground = new pc.Entity('ground');
        ground.addComponent('render', { type: 'plane', material: groundMat, receiveShadows: true });
        ground.setLocalScale(60, 1, 60);
        app.root.addChild(ground);

        // A few centerpieces — stylized rocks/cones
        const rockMat = new pc.StandardMaterial();
        rockMat.diffuse = new pc.Color(0.10, 0.12, 0.16);
        rockMat.metalness = 0.15;
        rockMat.useMetalness = true;
        rockMat.gloss = 0.3;
        rockMat.update();

        const positions = [
            { p: [0, 0, 0], s: [1.4, 1.8, 1.4] },
            { p: [-3, 0, -1], s: [1.1, 1.3, 1.1] },
            { p: [3, 0, -2], s: [0.9, 1.0, 0.9] },
            { p: [1.5, 0, 2.5], s: [0.7, 0.9, 0.7] },
            { p: [-2.5, 0, 2], s: [0.6, 0.7, 0.6] }
        ];
        for (const cfg of positions) {
            const r = new pc.Entity();
            r.addComponent('render', { type: 'cone', material: rockMat });
            r.setLocalPosition(cfg.p[0], cfg.s[1] * 0.5, cfg.p[2]);
            r.setLocalScale(cfg.s[0], cfg.s[1], cfg.s[2]);
            app.root.addChild(r);
        }

        // ----- Particles -----
        const ENGINE = '../engine/examples/assets';
        const snowAsset = new pc.Asset('snowflake', 'texture',
            { url: `${ENGINE}/textures/snowflake.png` }, { srgb: true });

        const NUM_PARTICLES = 1500;
        countEl.textContent = String(NUM_PARTICLES);

        // CurveSet: array of [time, value, time, value, ...] arrays — one per axis
        const buildVelCurve = (vx, vy, vz) => {
            const cs = new pc.CurveSet([
                [0, vx],
                [0, vy],
                [0, vz]
            ]);
            cs.type = pc.CURVE_LINEAR;
            return cs;
        };

        const orbit = {
            target: new pc.Vec3(0, 1.5, 0),
            distance: 11,
            yaw: 35,
            pitch: 14,
            yawCurrent: 35,
            pitchCurrent: 14,
            distanceCurrent: 11
        };
        const applyCamera = () => {
            const yaw = orbit.yawCurrent * pc.math.DEG_TO_RAD;
            const pitch = orbit.pitchCurrent * pc.math.DEG_TO_RAD;
            const cy = Math.cos(pitch) * orbit.distanceCurrent;
            camera.setPosition(
                orbit.target.x + Math.sin(yaw) * cy,
                orbit.target.y + Math.sin(pitch) * orbit.distanceCurrent,
                orbit.target.z + Math.cos(yaw) * cy
            );
            camera.lookAt(orbit.target);
        };
        applyCamera();

        // Drag input
        const drag = { active: false, id: null, lastX: 0, lastY: 0 };
        canvas.addEventListener('pointerdown', (e) => {
            canvas.setPointerCapture(e.pointerId);
            drag.active = true; drag.id = e.pointerId;
            drag.lastX = e.clientX; drag.lastY = e.clientY;
            document.body.classList.add('dragging');
        });
        canvas.addEventListener('pointermove', (e) => {
            if (!drag.active || drag.id !== e.pointerId) return;
            orbit.yaw -= (e.clientX - drag.lastX) * 0.32;
            orbit.pitch += (e.clientY - drag.lastY) * 0.32;
            orbit.pitch = Math.max(-5, Math.min(75, orbit.pitch));
            drag.lastX = e.clientX; drag.lastY = e.clientY;
        });
        const onUp = (e) => {
            if (drag.id === e.pointerId) {
                drag.active = false; drag.id = null;
                document.body.classList.remove('dragging');
            }
        };
        canvas.addEventListener('pointerup', onUp);
        canvas.addEventListener('pointercancel', onUp);
        canvas.addEventListener('wheel', (e) => {
            orbit.distance += e.deltaY * 0.012;
            orbit.distance = Math.max(5, Math.min(25, orbit.distance));
            e.preventDefault();
        }, { passive: false });

        // Frame loop
        let frameCount = 0, fpsAccum = 0, lastFpsTs = 0;
        let auto = true, lastInput = 0;
        const onAnyInput = () => { lastInput = performance.now(); auto = false; };
        canvas.addEventListener('pointerdown', onAnyInput);
        canvas.addEventListener('wheel', onAnyInput);

        app.on('update', (dt) => {
            const idle = performance.now() - lastInput;
            if (!drag.active && idle > 2500) auto = true;
            if (auto) orbit.yaw += dt * 4;

            const damp = 1 - Math.pow(0.001, dt);
            orbit.yawCurrent += (orbit.yaw - orbit.yawCurrent) * damp;
            orbit.pitchCurrent += (orbit.pitch - orbit.pitchCurrent) * damp;
            orbit.distanceCurrent += (orbit.distance - orbit.distanceCurrent) * damp;
            applyCamera();

            frameCount++;
            fpsAccum += dt;
            const now = performance.now();
            if (now - lastFpsTs > 500) {
                if (fpsEl) fpsEl.textContent = String(Math.round(frameCount / fpsAccum)).padStart(2, '0');
                frameCount = 0; fpsAccum = 0; lastFpsTs = now;
            }
        });

        // Boot
        const loader = new pc.AssetListLoader([snowAsset], app.assets);
        loader.load((errors) => {
            if (errors) {
                console.error('Asset load errors:', errors);
                splash.querySelector('.splash-label').textContent = 'Asset load error';
                return;
            }

            // Particle emitter — tall sky volume
            const emitter = new pc.Entity('snow');
            emitter.addComponent('particlesystem', {
                numParticles: NUM_PARTICLES,
                lifetime: 8,
                rate: 0.001,
                rate2: 0.005,
                startAngle: 0,
                startAngle2: 360,
                emitterShape: pc.EMITTERSHAPE_BOX,
                emitterExtents: new pc.Vec3(15, 0.1, 15),
                velocityGraph: buildVelCurve(0.3, -1.2, 0.2),
                velocityGraph2: buildVelCurve(-0.3, -2.0, -0.2),
                scaleGraph: new pc.Curve([0, 0.06, 1, 0.04]),
                rotationSpeedGraph: new pc.Curve([0, 30]),
                rotationSpeedGraph2: new pc.Curve([0, -30]),
                colorMap: snowAsset.resource,
                blendType: pc.BLEND_ADDITIVE,
                depthSoftening: 0.1,
                loop: true
            });
            emitter.setLocalPosition(0, 12, 0);
            app.root.addChild(emitter);

            requestAnimationFrame(() => splash.classList.add('hidden'));
        });

        app.start();

        window.addEventListener('error', (e) => console.error('[particles]', e.message, e.error));
    </script>
</body>
</html>
